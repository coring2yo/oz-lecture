<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>User Registration Form</title>
    </head>
    <body>
        <h1>User Registration</h1>
        <form action="#" method="post"></form>
            <input type="text" name="username" placeholder="사용자 이름">
            <input type="email" name="email" placeholder="example@domain.com">
            <input type="password" name="password" placeholder="비밀번호">
            <input type="date" name="birthdate" placeholder="생일을 선택하세요.">
            <label for="나이">나이:</label><input type="number" name="age" min="18" max="100" />
            <label for="만족도">만족도:</label><input type="range" name="volume" min="1" max="10" />

       
         <div>
              <br>
                <label for="성별을 선택해주세요">성별을 선택해주세요 :</label>
                <input type="radio" name="gender" value="male"> 남성
                <input type="radio" name="gender" value="female"> 여성
                <input type="radio" name="gender" value="other"> 그 외
         </div>
         <div>
                <label for="관심사를 선택해주세요">관심사를 선택해주세요 :</label>
                <input type="checkbox" name="hobby" value="coding"> 코딩
                <input type="checkbox" name="hobby" value="gaming"> 게임
                <input type="checkbox" name="hobby" value="reading"> 독서
        </div>
        <div>
            <br>
                <label for="국가를 선택해주세요">국가를 선택해주세요 :</label>
                <select name="country" multiple>
                    <option value="kr">South Korea</option>
                    <option value="US">USA</option>
                    <option value="Jp">Japan</option>
                    <option value="Ch">China</option>
                    <option value="UK">UK</option>
                </select>
            </div>
            <br>
            <button type="submit">제출</button>
            <button type="reset">초기화</button>
      
    </body>
</html>
