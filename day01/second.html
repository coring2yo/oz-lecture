<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>나의 두번째 페이지</title>
    </head>
    <body>
        <h1>두번째 제목</h1>
        <ul>
            <li>사과</li>
            <li>바나나</li>
            <li>오렌지</li>
        </ul>
        <ol type="a">
            <li>첫 번째 단계</li>
            <li>두 번째 단계</li>
            <li>세 번째 단계</li>
        </ol>
        <img src="https://placehold.co/600x400" alt="설명이미지">
        <br>
        <a href="./first.html">첫번째 사이트로 이동</a>
        <a href="https://www.naver.com" target="_blank">네이버 새창으로 열기</a>
        <table>
          <tr>
            <th>이름</th>
            <th>나이</th>
          </tr>  
          <tr>
            <td>홍길동</td>
            <td>25</td>
          </tr>  
          <tr>
            <td>김영희</td>
            <td>30</td>
          </tr>  
           <tr>
            <td>김태민</td>
          </tr>  
        </table>
    </body>
</html>
